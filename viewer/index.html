<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LSF Viewer</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1a1a1a;
        color: #f0f0f0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        overflow: hidden;
      }

      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #ui {
        position: absolute;
        bottom: 16px;
        left: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
      }

      #ui button {
        background: #444;
        border: none;
        color: white;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }

      #ui button:hover {
        background: #555;
      }

      #ui button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #timeline {
        flex: 1;
        height: 6px;
        appearance: none;
        background: #333;
        border-radius: 3px;
        outline: none;
      }

      #timeline::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #0af;
        cursor: pointer;
      }

      #timestamp,
      #speed-label {
        font-variant-numeric: tabular-nums;
        min-width: 56px;
        text-align: center;
      }

      #drop-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 100, 200, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        font-size: 24px;
        font-weight: 600;
      }

      #drop-overlay.visible {
        display: flex;
      }

      #status {
        position: absolute;
        top: 16px;
        left: 16px;
        background: rgba(0, 0, 0, 0.7);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        max-width: 400px;
      }

      #status.error {
        background: rgba(200, 0, 0, 0.8);
      }

      #status.warning {
        background: rgba(200, 120, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>

      <div id="status">Initialisation…</div>

      <div id="ui">
        <button id="btn-play" disabled>▶︎</button>
        <input
          id="timeline"
          type="range"
          min="0"
          max="1"
          step="0.001"
          value="0"
          disabled
        />
        <span id="timestamp">0.0 / 0.0 s</span>
        <button id="btn-speed-down">−</button>
        <span id="speed-label">1.0×</span>
        <button id="btn-speed-up">+</button>
      </div>

      <div id="drop-overlay">
        Déposez un fichier .vrm ou .vrma / .glb
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
